<!DOCTYPE html>
<html>
<body>
  <h1>MetricPath Analytics</h1>
  <input id="url" placeholder="URL">
  <input id="campaign" placeholder="Campaign Name">
  <button onclick="shorten()">Create Link</button>
  <p id="result"></p>

  <script>
    async function shorten() {
      const res = await fetch('/api/shorten', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ url: document.getElementById('url').value, campaign: document.getElementById('campaign').value })
      });
      const data = await res.json();
      document.getElementById('result').innerText = 'Link: ' + data.shortUrl;
    }
  </script>
</body>
</html>
